<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>GWU Copy Image Fixture</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: sans-serif;
        background: #020617;
        color: #e2e8f0;
      }

      generated-image {
        display: block;
      }

      .card {
        padding: 24px;
        border-radius: 24px;
        background: rgba(15, 23, 42, 0.94);
        box-shadow: 0 24px 80px rgba(2, 6, 23, 0.45);
      }

      .image {
        width: 320px;
        height: auto;
        display: block;
        border-radius: 18px;
      }

      .actions {
        display: flex;
        gap: 10px;
        margin-top: 14px;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 10px 14px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card attachment-container generated-images">
      <generated-image>
        <div class="generated-image-container">
          <img class="image" alt=", AI generated">
          <div class="actions">
            <button id="copy-image" type="button" aria-label="Copy image">Copy image</button>
            <button type="button">Download</button>
            <button type="button">Share</button>
          </div>
        </div>
      </generated-image>
    </div>

    <script>
      function createFixtureBlob() {
        const canvas = document.createElement('canvas');
        canvas.width = 589;
        canvas.height = 1024;
        const context = canvas.getContext('2d');
        const gradient = context.createLinearGradient(0, 0, canvas.width, canvas.height);
        gradient.addColorStop(0, '#22c55e');
        gradient.addColorStop(0.5, '#14b8a6');
        gradient.addColorStop(1, '#0f766e');
        context.fillStyle = gradient;
        context.fillRect(0, 0, canvas.width, canvas.height);
        context.fillStyle = 'rgba(255, 255, 255, 0.18)';
        context.fillRect(40, 120, 500, 110);
        context.fillStyle = '#f8fafc';
        context.font = '700 58px sans-serif';
        context.fillText('Clean visible image', 40, 185);
        return new Promise((resolve) => {
          canvas.toBlob(resolve, 'image/png');
        });
      }

      window.__nativeCopyImageCalls = 0;
      createFixtureBlob().then((blob) => {
        const objectUrl = URL.createObjectURL(blob);
        const image = document.querySelector('.image');
        image.src = objectUrl;
        image.dataset.gwuImageState = 'ready';
      });

      document.getElementById('copy-image').addEventListener('click', () => {
        window.__nativeCopyImageCalls += 1;
      });
    </script>
  </body>
</html>
